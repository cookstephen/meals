<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Picker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .result {
            font-size: 1.5rem;
            color: #667eea;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .result.spinning {
            animation: pulse 0.1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .mode-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .mode-toggle label {
            font-size: 0.95rem;
            color: #555;
            cursor: pointer;
        }

        .switch {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ccc;
            border-radius: 26px;
            transition: 0.3s;
        }

        .slider::before {
            content: "";
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        .switch input:checked + .slider {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .switch input:checked + .slider::before {
            transform: translateX(24px);
        }

        #bbqMode:checked + .slider {
            background: linear-gradient(135deg, #ff6b35 0%, #c0392b 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>What's for Dinner?</h1>
        <div class="mode-toggle">
            <span>Student Mode</span>
            <label class="switch">
                <input type="checkbox" id="studentMode" onchange="updateMode('student')">
                <span class="slider"></span>
            </label>
        </div>
        <div class="mode-toggle">
            <span>BBQ Mode 🔥</span>
            <label class="switch">
                <input type="checkbox" id="bbqMode" onchange="updateMode('bbq')">
                <span class="slider"></span>
            </label>
        </div>
        <div class="result" id="result">Press the button!</div>
        <button id="pickBtn" onclick="pickMeal()">Pick a Meal</button>
    </div>

    <script>
        const meals = [
            "Pasta Bolognese",
            "Chicken Stir Fry",
            "Chicken Fajitas",
            "Beef Fajitas",
            "Pizza",
            "Homemade pizza",
            "Curry",
            "Carbonara",
            "Meatballs & Pasta",
            "Chilli Con Carne",
            "Jambalya",
            "Home made Burgers",
            "Thai Red curry",
            "Boss Hogg Chicken",
            "Katsu curry",
            "Singaphore Noodles",
            "Home Fish and Chips",
            "Lamb burgers",
            "Lasagna",
            "Chippy Fish & Chips",
            "Shepards pie",
            "Something new from Green recipe book",
            "Something new from Ken Holm books",
            "Something new",
            "Sausage, Egg & Chips",
            "Gammon Steak",
            "Pukka Pie",
            "Sausage & Mash",
            "Salmon steak",
            "Pork Chops",
            "Sausage Casserole",
            "Sauage, Bean, Potato Waffle pie",
            "Fish Finger sarnies",
            "Pork Chop and dauphne potatos",
            "Roast chicken quarters",
            "Thai green curry"
        ];

        const studentMeals = [
            "Beans on Toast",
            "Pot Noodle",
            "Super Noodles",
            "Cheese Toastie",
            "Egg on Toast",
            "Tinned Soup & Bread",
            "Jacket Potato & Beans",
            "Pasta & Pesto",
            "Cheese & Tomato Pasta",
            "Fish Finger Sandwich",
            "Spaghetti Hoops on Toast",
            "Oven Chips & Nuggets",
            "Microwave Rice & Curry Sauce",
            "Ramen Noodles",
            "Frozen Pizza",
            "Baked Beans & Sausages",
            "Omelette"
        ];

        const bbqMeals = [
            "Burgers",
            "BBQ Ribs",
            "Grilled Chicken Thighs",
            "Corn on the Cob",
            "BBQ Sausages",
            "Pulled Pork",
            "Grilled Salmon",
            "Lamb Chops",
            "BBQ Chicken Wings",
            "Pork Belly Slices",
            "Halloumi & Veggie Skewers",
            "Steak",
            "Grilled Prawns",
            "Hot Dogs",
            "BBQ Spatchcock Chicken",
            "Lamb Koftas",
            "Smoked Brisket",
            "Chicken Curry Kebab",
            "Pork & Prawn Burgers",
            "Beer Can Chicken"
        ];

        let activeMode = 'normal';

        function updateMode(toggled) {
            const studentEl = document.getElementById('studentMode');
            const bbqEl = document.getElementById('bbqMode');

            if (toggled === 'student' && studentEl.checked) {
                bbqEl.checked = false;
                activeMode = 'student';
            } else if (toggled === 'bbq' && bbqEl.checked) {
                studentEl.checked = false;
                activeMode = 'bbq';
            } else {
                activeMode = 'normal';
            }

            document.getElementById('result').textContent = 'Press the button!';
        }

        function getActiveMeals() {
            if (activeMode === 'student') return studentMeals;
            if (activeMode === 'bbq') return bbqMeals;
            return meals;
        }

        function pickMeal() {
            const resultEl = document.getElementById('result');
            const btn = document.getElementById('pickBtn');
            const activeMeals = getActiveMeals();

            btn.disabled = true;
            resultEl.classList.add('spinning');

            let spins = 0;
            const totalSpins = 15;

            const interval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * activeMeals.length);
                resultEl.textContent = activeMeals[randomIndex];
                spins++;

                if (spins >= totalSpins) {
                    clearInterval(interval);
                    resultEl.classList.remove('spinning');
                    btn.disabled = false;
                }
            }, 100);
        }
    </script>
</body>
</html>
